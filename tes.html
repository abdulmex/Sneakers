<!DOCTYPE html>
<html lang="en">
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
      <link rel="stylesheet" href="/CSS/index.css">
    </head>
    <body>
               <!-- Button trigger for signup modal -->
               <button type="button" class="btn" data-bs-toggle="modal" data-bs-target="#signupModal"> Sign Up</button>
              <!-- Modal -->
            <div class="modal fade" id="signupModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true" >
                <div class="modal-dialog">
                  <div class="modal-content text-center">
                    <div class="modal-header">
                        <h1>Sign Up</h1>
                      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form class="px-md-2">
                            <div class="form-outline mb-4">
                              <input type="text" id="form3Example1q" placeholder="Name" class="form-control" required autofocus/>
                            </div>
                        <div class="form-outline mb-4">
                            <input type="email" id="inputEmail" class="form-control" placeholder="example@gmail.com" required autofocus/>
                        </div>    
                        <div class="form-outline mb-3">
                            <input type="password" id="inputPassword" class="form-control" placeholder="Password" required>
                        </div>
                        <div class="form-outline mb-4">
                            <input type="password" id="inputPassword" class="form-control" placeholder="Repeat password"  required autofocus>
                        </div>
                            <div class="col-md-6 mb-4">
                                <div class="d-md-flex mb-4 py-2">
                                    <h6 class="mb-0 me-4">Gender: </h6>
                                    <div class="form-check form-check-inline mb-0 me-4">
                                      <input class="form-check-input" type="radio" name="inlineRadioOptions" id="femaleGender"
                                        value="option1" />
                                      <label class="form-check-label" for="femaleGender">Male</label>
                                    </div>
                                    <div class="form-check form-check-inline mb-0 me-4">
                                      <input class="form-check-input" type="radio" name="inlineRadioOptions" id="maleGender"
                                        value="option2" />
                                      <label class="form-check-label" for="maleGender">Female</label>
                                    </div>
                                    <div class="form-check form-check-inline mb-0">
                                      <input class="form-check-input" type="radio" name="inlineRadioOptions" id="otherGender"
                                        value="option3" />
                                      <label class="form-check-label" for="otherGender">Other</label>
                                    </div>
                                </div>
                            </div>
                            <button class="btn">Sign Up</button>
                          </form>
                    </div>
                </div>
            </div>    
              <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
              integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
              crossorigin="anonymous"></script>
    </body>
</html>
